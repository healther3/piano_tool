services:
  - type: web
    name: kangel-piano-proxy
    runtime: python
    plan: free
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: python -m gunicorn server:app --bind 0.0.0.0:$PORT
    envVars:
      - key: MIDISHOW_USER
        sync: false
      - key: MIDISHOW_PASS
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
